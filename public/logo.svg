<svg width="320" height="88" viewBox="0 0 320 88" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bagGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E90FF"/>
      <stop offset="100%" stop-color="#0A4DFF"/>
    </linearGradient>
    <linearGradient id="sparkGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#DFF1FF"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(8, 10)">
    <rect x="0" y="8" width="68" height="60" rx="16" fill="url(#bagGradient)" filter="url(#glow)"/>
    <path d="M18 26C18 16.0589 26.0589 8 36 8C45.9411 8 54 16.0589 54 26" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <path d="M18 36H54" stroke="white" stroke-width="3.5" opacity="0.9"/>
    <circle cx="28" cy="49" r="4" fill="url(#sparkGradient)"/>
    <circle cx="44" cy="49" r="4" fill="url(#sparkGradient)"/>
  </g>

  <text x="92" y="50" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#0D47A1">
    BlueCart
  </text>
  <text x="94" y="69" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1E88E5">
    Smart Ecommerce
  </text>
</svg>
